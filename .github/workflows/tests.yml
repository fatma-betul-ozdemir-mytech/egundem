name: Run Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Clear Playwright Cache (Optional but recommended)
        run: rm -rf ~/.cache/ms-playwright

      - name: Install Playwright and Browsers
        run: |
          npx playwright install --with-deps

      - name: Show Installed Browsers (Debug step)
        run: ls -R ~/.cache/ms-playwright || true

      - name: Run Playwright Tests
        run: npx playwright test
